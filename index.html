<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#0d0d14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Math Trainer"/>
  <title>Math Trainer Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      height:100%;background:#0d0d14;
      font-family:'DM Mono','Courier New',monospace;
      color:#e0e0e0;-webkit-tap-highlight-color:transparent;overflow-x:hidden;
    }
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    input[type=number]{-moz-appearance:textfield}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:#0d0d14}
    ::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
    button{font-family:'DM Mono','Courier New',monospace;cursor:pointer;-webkit-tap-highlight-color:transparent}

    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
    @keyframes popIn{0%{opacity:0;transform:scale(0.95)}100%{opacity:1;transform:scale(1)}}

    .screen{animation:popIn 0.2s ease both}

    #app{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 20px 60px}
    .wrap{width:100%;max-width:500px}

    /* Op buttons — toggled via JS without re-render */
    .op-btn{
      padding:16px 14px;background:transparent;
      border:1px solid #1e1e2e;border-radius:10px;
      display:flex;align-items:center;gap:12px;
      width:100%;text-align:left;
      transition:background 0.15s,border-color 0.15s;
    }
    .op-btn .check{
      margin-left:auto;width:18px;height:18px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:10px;color:#000;font-weight:700;
      opacity:0;transition:opacity 0.15s;
    }
    .op-btn.sel .check{opacity:1}

    /* Diff buttons */
    .diff-btn{
      flex:1;padding:12px 8px;background:transparent;
      border:1px solid #1e1e2e;border-radius:8px;
      transition:background 0.15s,border-color 0.15s;
    }
    .diff-btn .dlbl{font-size:12px;font-weight:500;color:#555;transition:color 0.15s}
    .diff-btn .dsub{font-size:9px;color:#333;margin-top:3px}
    .diff-btn.sel{border-color:#4ade80;background:rgba(74,222,128,0.08)}
    .diff-btn.sel .dlbl{color:#4ade80}

    .btn-primary{
      width:100%;padding:18px;background:rgba(74,222,128,0.07);
      border:1px solid #4ade80;border-radius:12px;color:#4ade80;
      font-size:14px;font-weight:500;letter-spacing:4px;
    }
    .btn-primary:active{background:rgba(74,222,128,0.2)}
    .btn-ghost{
      width:100%;padding:14px;background:transparent;
      border:1px solid #1e1e2e;border-radius:12px;color:#444;font-size:12px;
    }
    .btn-sm{padding:6px 14px;background:transparent;border:1px solid #1e1e2e;border-radius:6px;color:#444;font-size:11px}

    #progressFill{height:100%;border-radius:2px;transition:width 0.4s ease}
    #dotTrail{display:flex;gap:3px;margin-top:8px;flex-wrap:wrap}
    .dot{width:6px;height:6px;border-radius:50%;background:#111;transition:background 0.2s}

    #questionText{
      font-size:68px;font-weight:500;letter-spacing:-4px;line-height:1;
      color:#fff;transition:color 0.12s,text-shadow 0.12s;
    }
    #questionText.fok{color:#4ade80;text-shadow:0 0 60px rgba(74,222,128,.5)}
    #questionText.ferr{color:#f87171;text-shadow:0 0 60px rgba(248,113,113,.5)}
    #questionText.shk{animation:shake 0.3s ease}

    #answerInput{
      width:100%;padding:18px 20px;background:#0a0a12;
      border:1px solid #1e1e2e;border-radius:10px;color:#fff;
      font-size:28px;font-family:inherit;font-weight:500;
      text-align:center;outline:none;transition:border-color 0.2s;-webkit-appearance:none;
    }
    #submitBtn{
      width:100%;margin-top:8px;padding:15px;background:transparent;
      border:1px solid #1e1e2e;border-radius:10px;color:#2a2a3a;
      font-size:12px;font-weight:700;letter-spacing:3px;
      transition:background 0.15s,border-color 0.15s,color 0.15s;
    }

    .card{background:#0f0f18;border:1px solid #1a1a24;border-radius:12px;overflow:hidden;margin-bottom:12px}
    .tabs{display:flex;border:1px solid #1a1a24;border-radius:8px;overflow:hidden;margin-bottom:20px}
    .tab-btn{
      flex:1;padding:12px 8px;background:transparent;border:none;
      border-right:1px solid #1a1a24;color:#444;font-size:11px;font-weight:700;letter-spacing:1px;
      transition:background 0.15s,color 0.15s;
    }
    .tab-btn:last-child{border-right:none}
    .tab-btn.active{background:rgba(74,222,128,0.1);color:#4ade80}
    .mbt{margin-bottom:10px}
    .mbt-lbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
    .mbt-track{height:6px;background:#1c1c28;border-radius:3px}
    .mbt-fill{height:100%;border-radius:3px;transition:width 0.8s ease}
    .tg{display:flex;gap:6px;margin-top:10px}
    .tb{flex:1;text-align:center;padding:8px 4px;border-radius:7px;border:1px solid transparent}
    .tb-n{font-size:16px;font-weight:700}
    .tb-l{font-size:8px;margin-top:2px}
    .dh{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;padding:7px 14px;font-size:8px;letter-spacing:2px;color:#2a2a3a;border-top:1px solid #111}
    .dr{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;padding:9px 14px;align-items:center;border-top:1px solid #0c0c14}
    .dr:nth-child(even){background:rgba(255,255,255,.01)}
    #installBanner{position:fixed;bottom:16px;left:16px;right:16px;background:#1a1a28;border:1px solid #4ade8044;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:999}
  </style>
</head>
<body>
<div id="app"><div class="wrap">

  <!-- HOME (static HTML, toggled with JS only) -->
  <div id="scHome" class="screen">
    <div style="text-align:center;margin-bottom:36px">
      <div style="font-size:9px;letter-spacing:8px;color:#4ade80;opacity:.6;margin-bottom:10px">MATH TRAINER PRO</div>
      <h1 style="font-size:38px;font-weight:500;color:#fff;letter-spacing:-1px;text-shadow:0 0 80px rgba(74,222,128,.2)">
        Latihan<br><span style="font-weight:300;color:#555">Matematika</span>
      </h1>
    </div>
    <div style="margin-bottom:28px">
      <div style="font-size:9px;letter-spacing:4px;color:#333;margin-bottom:14px">
        PILIH TIPE SOAL <span style="color:#555">(kosong = semua)</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button class="op-btn" id="ob-add" onclick="toggleOp('add')">
          <span style="font-size:24px;color:#4ade80;width:28px;text-align:center">+</span>
          <div><div style="font-size:12px;font-weight:500;color:#4ade80">Penjumlahan</div><div style="font-size:9px;color:#333;margin-top:2px">20 soal</div></div>
          <div class="check" style="background:#4ade80">✓</div>
        </button>
        <button class="op-btn" id="ob-sub" onclick="toggleOp('sub')">
          <span style="font-size:24px;color:#60a5fa;width:28px;text-align:center">−</span>
          <div><div style="font-size:12px;font-weight:500;color:#60a5fa">Pengurangan</div><div style="font-size:9px;color:#333;margin-top:2px">20 soal</div></div>
          <div class="check" style="background:#60a5fa">✓</div>
        </button>
        <button class="op-btn" id="ob-mul" onclick="toggleOp('mul')">
          <span style="font-size:24px;color:#fbbf24;width:28px;text-align:center">×</span>
          <div><div style="font-size:12px;font-weight:500;color:#fbbf24">Perkalian</div><div style="font-size:9px;color:#333;margin-top:2px">20 soal</div></div>
          <div class="check" style="background:#fbbf24">✓</div>
        </button>
        <button class="op-btn" id="ob-div" onclick="toggleOp('div')">
          <span style="font-size:24px;color:#f87171;width:28px;text-align:center">÷</span>
          <div><div style="font-size:12px;font-weight:500;color:#f87171">Pembagian</div><div style="font-size:9px;color:#333;margin-top:2px">20 soal</div></div>
          <div class="check" style="background:#f87171">✓</div>
        </button>
      </div>
    </div>
    <div style="margin-bottom:28px">
      <div style="font-size:9px;letter-spacing:4px;color:#333;margin-bottom:14px">KESULITAN</div>
      <div style="display:flex;gap:8px">
        <button class="diff-btn" id="db-easy" onclick="setDiff('easy')"><div class="dlbl">Mudah</div><div class="dsub">Angka kecil</div></button>
        <button class="diff-btn sel" id="db-medium" onclick="setDiff('medium')"><div class="dlbl">Sedang</div><div class="dsub">2 digit</div></button>
        <button class="diff-btn" id="db-hard" onclick="setDiff('hard')"><div class="dlbl">Susah</div><div class="dsub">Besar / 1–12×</div></button>
      </div>
    </div>
    <div style="display:flex;justify-content:center;gap:24px;font-size:10px;color:#333;padding:12px 0;border-top:1px solid #111;border-bottom:1px solid #111;margin-bottom:24px">
      <span id="iOps">4 tipe dipilih</span><span>·</span>
      <span id="iTotal">80 total soal</span><span>·</span><span>Timer otomatis</span>
    </div>
    <button class="btn-primary" onclick="startQuiz()">MULAI LATIHAN →</button>
    <button class="btn-ghost" id="histBtn" style="margin-top:10px;display:none" onclick="showHistory()">📊 Lihat Riwayat Analisis</button>
  </div>

  <!-- QUIZ (static shell, content updated via JS) -->
  <div id="scQuiz" style="display:none">
    <div id="opTabs" style="display:flex;gap:6px;margin-bottom:24px"></div>
    <div style="margin-bottom:32px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#333;margin-bottom:7px">
        <span id="opLbl" style="font-weight:700"></span><span id="qCtr"></span>
      </div>
      <div style="height:3px;background:#1a1a24;border-radius:2px"><div id="progressFill"></div></div>
      <div id="dotTrail"></div>
    </div>
    <div style="text-align:center;margin-bottom:44px">
      <div id="questionText">–</div>
      <div style="font-size:12px;color:#222;margin-top:6px">= ?</div>
    </div>
    <input id="answerInput" type="number" placeholder="Ketik jawaban..."
      oninput="onAnsInput(this.value)" onkeydown="if(event.key==='Enter')submitAnswer()"/>
    <button id="submitBtn" onclick="submitAnswer()">KIRIM ↵</button>
  </div>

  <!-- RESULT & HISTORY (innerHTML rebuilt on navigate) -->
  <div id="scResult" style="display:none"></div>
  <div id="scHistory" style="display:none"></div>

</div></div>

<script>
// ══════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════
const OPS=[
  {key:'add',sym:'+',label:'Penjumlahan',color:'#4ade80',bg:'rgba(74,222,128,.08)'},
  {key:'sub',sym:'−',label:'Pengurangan',color:'#60a5fa',bg:'rgba(96,165,250,.08)'},
  {key:'mul',sym:'×',label:'Perkalian',  color:'#fbbf24',bg:'rgba(251,191,36,.08)'},
  {key:'div',sym:'÷',label:'Pembagian',  color:'#f87171',bg:'rgba(248,113,113,.08)'},
];
const TQ=20;

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let selOps=[],diff='medium',opQ=[],oIdx=0,qs=[],cur=0,res=[],startT=null,busy=false;
let history=lh(),summary=[],atab='overview',hOp=null,dSess=null;

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function op(k){return OPS.find(o=>o.key===k)}
function sp(ms){
  if(ms<3000)return{l:'Kilat',i:'⚡',c:'#4ade80',r:4};
  if(ms<6000)return{l:'Cepat',i:'▶',c:'#60a5fa',r:3};
  if(ms<10000)return{l:'Sedang',i:'◎',c:'#fbbf24',r:2};
  return{l:'Lambat',i:'◐',c:'#f87171',r:1};
}
function mc(p){return p>=85?'#4ade80':p>=65?'#60a5fa':p>=45?'#fbbf24':'#f87171'}
function ml(p){return p>=85?'Mahir':p>=65?'Berkembang':p>=45?'Cukup':'Perlu Latihan'}
function mast(r){
  if(!r.length)return 0;
  const a=r.filter(x=>x.correct).length/r.length*100;
  const s=r.reduce((t,x)=>t+sp(x.timeMs).r,0)/r.length;
  return Math.round(a*.6+(s/4)*100*.4);
}
function am(r){return r.length?r.reduce((s,x)=>s+x.timeMs,0)/r.length:0}
function rnd(n){return Math.floor(Math.random()*n)+1}
function mkQ(k,d){
  const mx=d==='easy'?9:d==='medium'?50:99, mm=d==='easy'?5:d==='medium'?10:12;
  let a,b,ans,disp;
  if(k==='add'){a=rnd(mx);b=rnd(mx);ans=a+b;disp=`${a} + ${b}`}
  else if(k==='sub'){a=rnd(mx)+2;b=rnd(a-1)+1;ans=a-b;disp=`${a} − ${b}`}
  else if(k==='mul'){a=rnd(mm)+1;b=rnd(mm)+1;ans=a*b;disp=`${a} × ${b}`}
  else{b=rnd(mm)+1;ans=rnd(mm)+1;a=b*ans;disp=`${a} ÷ ${b}`}
  return{key:k,display:disp,answer:ans};
}
function genQs(k,d){const q=[],s=new Set();while(q.length<TQ){const x=mkQ(k,d);if(!s.has(x.display)){s.add(x.display);q.push(x)}}return q}
function lh(){try{return JSON.parse(localStorage.getItem('mth')||'{}')}catch(e){return{}}}
function sh(){try{localStorage.setItem('mth',JSON.stringify(history))}catch(e){}}

// ══════════════════════════════════════════════════
//  HOME — in-place DOM updates (no flicker)
// ══════════════════════════════════════════════════
function toggleOp(key){
  const btn=document.getElementById('ob-'+key);
  const o=op(key);
  if(selOps.includes(key)){
    selOps=selOps.filter(k=>k!==key);
    btn.classList.remove('sel');
    btn.style.background='transparent';
    btn.style.borderColor='#1e1e2e';
  } else {
    selOps.push(key);
    btn.classList.add('sel');
    btn.style.background=o.bg;
    btn.style.borderColor=o.color;
  }
  const n=selOps.length||4;
  document.getElementById('iOps').textContent=`${n} tipe dipilih`;
  document.getElementById('iTotal').textContent=`${n*20} total soal`;
}

function setDiff(key){
  document.querySelectorAll('.diff-btn').forEach(b=>{b.classList.remove('sel')});
  document.getElementById('db-'+key).classList.add('sel');
  diff=key;
}

// ══════════════════════════════════════════════════
//  SCREEN SWITCH
// ══════════════════════════════════════════════════
function showSc(id){
  ['scHome','scQuiz','scResult','scHistory'].forEach(s=>{
    const el=document.getElementById(s);
    if(el){el.style.display='none';el.classList.remove('screen')}
  });
  const el=document.getElementById(id);
  if(el){el.style.display='block';void el.offsetWidth;el.classList.add('screen')}
}

// ══════════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════════
function startQuiz(){
  opQ=selOps.length?[...selOps]:OPS.map(o=>o.key);
  oIdx=0;cur=0;res=[];summary=[];
  qs=genQs(opQ[0],diff);
  showSc('scQuiz');
  paintQuizFrame();
  setTimeout(()=>{const i=document.getElementById('answerInput');if(i){i.value='';i.focus();}},80);
  startT=Date.now();
}

function paintQuizFrame(){
  const o=op(opQ[oIdx]);
  // Op tabs
  document.getElementById('opTabs').innerHTML=opQ.map((k,i)=>{
    const x=op(k),dn=i<oIdx,ac=i===oIdx;
    return `<div style="flex:1;padding:7px 4px;text-align:center;border-radius:7px;font-size:10px;
      border:1px solid ${ac?x.color:dn?'#1e3a1e':'#1a1a24'};
      background:${ac?x.bg:dn?'rgba(74,222,128,.04)':'transparent'};
      color:${ac?x.color:dn?'#2a5a2a':'#2a2a3a'};font-weight:${ac?700:400}">
      ${dn?'✓':x.sym}
      <div style="font-size:8px;margin-top:2px;opacity:.7">${x.label.slice(0,5)}</div>
    </div>`;
  }).join('');
  // Input colors
  const ai=document.getElementById('answerInput');
  ai.onfocus=()=>{ai.style.borderColor=o.color};
  ai.onblur=()=>{ai.style.borderColor='#1e1e2e'};
  updateQuizQ();
}

function updateQuizQ(){
  const o=op(opQ[oIdx]),q=qs[cur];
  document.getElementById('progressFill').style.cssText=`width:${(cur/TQ)*100}%;background:${o.color}`;
  document.getElementById('opLbl').style.color=o.color;
  document.getElementById('opLbl').textContent=`${o.sym} ${o.label}`;
  document.getElementById('qCtr').textContent=`${cur+1} / ${TQ}`;
  // Dots
  document.getElementById('dotTrail').innerHTML=qs.map((_,i)=>{
    const bg=i<res.length?(res[i].correct?o.color:'#f87171'):i===cur?o.color+'66':'#111';
    return `<div class="dot" style="background:${bg}"></div>`;
  }).join('');
  // Question
  const qt=document.getElementById('questionText');
  qt.className='';qt.textContent=q.display;
  qt.style.textShadow=`0 0 30px ${o.color}22`;qt.style.color='#fff';
  // Submit btn reset
  const sb=document.getElementById('submitBtn');
  sb.style.borderColor='#1e1e2e';sb.style.color='#2a2a3a';sb.style.background='transparent';
}

function onAnsInput(v){
  const o=op(opQ[oIdx]),sb=document.getElementById('submitBtn');
  if(v){sb.style.borderColor=o.color;sb.style.color=o.color;sb.style.background=o.bg}
  else{sb.style.borderColor='#1e1e2e';sb.style.color='#2a2a3a';sb.style.background='transparent'}
}

function submitAnswer(){
  if(busy)return;
  const ai=document.getElementById('answerInput');
  const val=parseInt(ai.value,10);
  if(isNaN(val)||!qs[cur])return;
  busy=true;
  const elapsed=Date.now()-startT,q=qs[cur],ok=val===q.answer,o=op(opQ[oIdx]);
  // Flash
  const qt=document.getElementById('questionText');
  qt.classList.add(ok?'fok':'ferr');if(!ok)qt.classList.add('shk');
  setTimeout(()=>{
    qt.classList.remove('fok','ferr','shk');
    const nr=[...res,{question:q,userAnswer:val,correct:ok,timeMs:elapsed}];
    res=nr;
    // Update dot
    const dots=document.querySelectorAll('#dotTrail .dot');
    if(dots[cur])dots[cur].style.background=ok?o.color:'#f87171';

    if(cur+1>=TQ){
      const sess={date:new Date().toLocaleString('id-ID',{dateStyle:'short',timeStyle:'short'}),difficulty:diff,results:nr};
      if(!history[opQ[oIdx]])history[opQ[oIdx]]=[];
      history[opQ[oIdx]].push(sess);sh();
      summary.push({opKey:opQ[oIdx],session:sess});
      const ni=oIdx+1;
      if(ni<opQ.length){
        oIdx=ni;cur=0;res=[];
        qs=genQs(opQ[oIdx],diff);
        ai.value='';busy=false;
        paintQuizFrame();
        setTimeout(()=>{ai.value='';ai.focus();startT=Date.now();},80);
      } else {
        busy=false;buildResult();
      }
    } else {
      cur++;ai.value='';busy=false;
      updateQuizQ();
      setTimeout(()=>{ai.value='';ai.focus();startT=Date.now();},50);
    }
  },380);
}

// ══════════════════════════════════════════════════
//  RESULT
// ══════════════════════════════════════════════════
function buildResult(){
  atab='overview';
  const tc=summary.reduce((s,{session:x})=>s+x.results.filter(r=>r.correct).length,0);
  const tq=summary.reduce((s,{session:x})=>s+x.results.length,0);
  const el=document.getElementById('scResult');
  el.innerHTML=`
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:9px;letter-spacing:6px;color:#4ade80;opacity:.6;margin-bottom:8px">SESI SELESAI</div>
      <div style="font-size:52px;font-weight:700;color:#fff;line-height:1">${tc}<span style="font-size:22px;color:#333">/${tq}</span></div>
      <div style="font-size:12px;color:#444;margin-top:4px">Akurasi ${tq?Math.round(tc/tq*100):0}%</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" id="tb-ov" onclick="switchTab('overview')">RINGKASAN</button>
      <button class="tab-btn" id="tb-dt" onclick="switchTab('detail')">DETAIL SOAL</button>
    </div>
    <div id="tabC"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button onclick="startQuiz()" style="flex:2;padding:16px;background:rgba(74,222,128,.07);border:1px solid #4ade80;border-radius:10px;color:#4ade80;font-size:12px;font-weight:700;letter-spacing:3px">ULANGI →</button>
      <button onclick="showHistory()" style="flex:1;padding:16px;background:transparent;border:1px solid #1e1e2e;border-radius:10px;color:#555;font-size:11px">📊</button>
      <button onclick="goHome()" style="flex:1;padding:16px;background:transparent;border:1px solid #1e1e2e;border-radius:10px;color:#555;font-size:11px">Menu</button>
    </div>`;
  showSc('scResult');
  renderTab();
}

function switchTab(t){
  atab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const tb=document.getElementById('tb-'+(t==='overview'?'ov':'dt'));
  if(tb)tb.classList.add('active');
  renderTab();
}
function renderTab(){
  const el=document.getElementById('tabC');if(!el)return;
  el.innerHTML=atab==='overview'?bOv():bDt();
}

function bOv(){
  return summary.map(({opKey,session:x})=>{
    const o=op(opKey),c=x.results.filter(r=>r.correct).length,a=Math.round(c/TQ*100),av=am(x.results),ms=mast(x.results),mc_=mc(ms);
    return `<div class="card" style="border-color:${o.color}33">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid ${o.color}18;background:${o.bg}">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:24px;color:${o.color}">${o.sym}</span>
          <div><div style="font-size:13px;font-weight:500;color:${o.color}">${o.label}</div>
            <div style="font-size:9px;color:#444;margin-top:1px">${c}/${TQ} benar · ${(av/1000).toFixed(1)}s rata-rata</div></div>
        </div>${rSVG(ms,mc_,70)}
      </div>
      <div style="padding:14px 16px">
        ${mBar('Akurasi',a,o.color,a+'%')}
        ${mBar('Kecepatan',Math.max(0,100-(av/150)),sp(av).c,(av/1000).toFixed(1)+'s rata-rata')}
        ${tGrid(x.results)}${wkHTML(x.results,o)}
        <div style="margin-top:10px;text-align:right;font-size:11px;color:${mc_}">Level: <strong>${ml(ms)}</strong></div>
      </div></div>`;
  }).join('');
}

function bDt(){
  return summary.map(({opKey,session:x})=>{
    const o=op(opKey);
    return `<div class="card" style="border-color:${o.color}33;margin-bottom:12px">
      <div style="padding:10px 14px;background:${o.bg};border-bottom:1px solid ${o.color}18">
        <span style="color:${o.color};font-weight:700">${o.sym} ${o.label}</span></div>
      <div style="padding:12px 14px">${tGrid(x.results)}</div>
      ${dtbl(x.results,o)}</div>`;
  }).join('');
}

// ══════════════════════════════════════════════════
//  HISTORY
// ══════════════════════════════════════════════════
function showHistory(){
  hOp=null;dSess=null;
  paintHistory();showSc('scHistory');
}
function paintHistory(){
  document.getElementById('scHistory').innerHTML=hOp?bHDrill():bHOv();
}
function bHOv(){
  const bd=summary.length?`showSc('scResult')`:`goHome()`;
  let h=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:28px">
    <button class="btn-sm" onclick="${bd}">← Kembali</button>
    <div><div style="font-size:9px;letter-spacing:4px;color:#333">ANALISIS</div>
      <div style="font-size:18px;font-weight:500;color:#fff">Riwayat Latihan</div></div></div>`;
  if(!Object.keys(history).length)return h+`<div style="text-align:center;color:#333;padding:60px;font-size:13px">Belum ada data.<br>Selesaikan kuis dulu!</div>`;
  OPS.forEach(o=>{
    const ss=history[o.key];if(!ss||!ss.length)return;
    const ar=ss.flatMap(s=>s.results),c=ar.filter(r=>r.correct).length,a=Math.round(c/ar.length*100),av=am(ar),ms=mast(ar),mc_=mc(ms);
    const tr=ss.slice(-5).map(s=>Math.round(s.results.filter(r=>r.correct).length/s.results.length*100));
    h+=`<div class="card" style="border-color:${o.color}33;cursor:pointer" onclick="drillH('${o.key}')">
      <div style="padding:16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div style="display:flex;gap:12px;align-items:center">
            <span style="font-size:26px;color:${o.color}">${o.sym}</span>
            <div><div style="font-size:13px;font-weight:500;color:${o.color}">${o.label}</div>
              <div style="font-size:9px;color:#444;margin-top:2px">${ss.length} sesi · ${ar.length} soal</div></div>
          </div>
          <div style="text-align:right"><div style="font-size:22px;font-weight:700;color:${mc_}">${ms}%</div>
            <div style="font-size:9px;color:${mc_}">${ml(ms)}</div></div>
        </div>
        <div style="font-size:9px;letter-spacing:3px;color:#333;margin-bottom:7px">TREN (${tr.length} sesi terakhir)</div>
        <div style="display:flex;gap:4px;align-items:flex-end;height:36px">
          ${tr.map(t=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="width:100%;height:${(t/100)*30}px;border-radius:2px;min-height:2px;background:${mc(t)}"></div>
            <div style="font-size:8px;color:#333">${t}%</div></div>`).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid #111;font-size:10px;color:#444">
          <span>Akurasi: <span style="color:${o.color}">${a}%</span></span>
          <span>Rata-rata: <span style="color:${sp(av).c}">${(av/1000).toFixed(1)}s</span></span>
          <span style="color:#555">Detail →</span>
        </div></div></div>`;
  });
  return h;
}
function drillH(key){hOp=key;dSess=null;paintHistory();}
function bHDrill(){
  const o=op(hOp),ss=history[hOp]||[];
  let h=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:28px">
    <button class="btn-sm" style="border-color:${o.color}44;color:${o.color}" onclick="hOp=null;dSess=null;paintHistory()">← Kembali</button>
    <div><div style="font-size:9px;letter-spacing:4px;color:#333">ANALISIS</div>
      <div style="font-size:18px;font-weight:500;color:${o.color}">${o.sym} ${o.label}</div></div></div>`;
  if(!ss.length)return h+`<div style="text-align:center;color:#333;padding:40px">Belum ada sesi.</div>`;
  ss.forEach((s,i)=>{
    const c=s.results.filter(r=>r.correct).length,a=Math.round(c/s.results.length*100),av=am(s.results),ms=mast(s.results),mc_=mc(ms),open=dSess===i;
    h+=`<div class="card" style="border-color:${open?o.color:'#1a1a24'}">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer" onclick="togSess(${i})">
        <div><div style="font-size:12px;color:#bbb">Sesi ${i+1}<span style="font-size:9px;color:#333;margin-left:8px">${s.date}</span></div>
          <div style="font-size:9px;color:#444;margin-top:2px">${c}/${s.results.length} benar · ${(av/1000).toFixed(1)}s · ${s.difficulty}</div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="text-align:right"><div style="font-size:17px;font-weight:700;color:${mc_}">${ms}%</div>
            <div style="font-size:8px;color:${mc_}">${ml(ms)}</div></div>
          <span style="color:#333;font-size:12px">${open?'▲':'▼'}</span></div>
      </div>
      ${open?`<div style="border-top:1px solid ${o.color}22">
        <div style="padding:12px 14px">${tGrid(s.results)}</div>${dtbl(s.results,o)}</div>`:''}
    </div>`;
  });
  return h;
}
function togSess(i){dSess=dSess===i?null:i;paintHistory();}

// ══════════════════════════════════════════════════
//  SHARED HTML BUILDERS
// ══════════════════════════════════════════════════
function rSVG(p,c,sz){
  const r=(sz/2)-7,cx=sz/2,cy=sz/2,ci=2*Math.PI*r,d=(p/100)*ci;
  return `<svg width="${sz}" height="${sz}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1c1c28" stroke-width="5"/>
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="5"
    stroke-dasharray="${d} ${ci}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
  <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle"
    fill="${c}" font-size="13" font-weight="700" font-family="'DM Mono',monospace">${p}%</text></svg>`;
}
function mBar(lbl,p,c,sub){
  return `<div class="mbt"><div class="mbt-lbl"><span style="color:#aaa">${lbl}</span><span style="color:${c}">${sub}</span></div>
  <div class="mbt-track"><div class="mbt-fill" style="width:${p}%;background:${c}"></div></div></div>`;
}
function tGrid(r){
  const ts=[{l:'Kilat ⚡',mn:0,mx:3000,c:'#4ade80'},{l:'Cepat ▶',mn:3000,mx:6000,c:'#60a5fa'},
    {l:'Sedang ◎',mn:6000,mx:10000,c:'#fbbf24'},{l:'Lambat ◐',mn:10000,mx:Infinity,c:'#f87171'}];
  return `<div class="tg">${ts.map(t=>{
    const n=r.filter(x=>x.timeMs>=t.mn&&x.timeMs<t.mx).length,cl=n>0?t.c:'#1a1a1a';
    return `<div class="tb" style="background:${n>0?t.c+'12':'transparent'};border-color:${n>0?t.c+'44':'#111'}">
      <div class="tb-n" style="color:${cl}">${n}</div><div class="tb-l" style="color:${cl}">${t.l}</div></div>`;
  }).join('')}</div>`;
}
function wkHTML(r,o){
  const w=r.filter(x=>!x.correct||x.timeMs>8000);if(!w.length)return'';
  return `<div style="padding:10px 12px;background:rgba(248,113,113,.04);border:1px solid rgba(248,113,113,.15);border-radius:8px;margin-top:10px">
    <div style="font-size:9px;letter-spacing:3px;color:#f87171;margin-bottom:7px">PERLU LATIHAN LAGI</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">
      ${w.map(x=>`<span style="padding:3px 9px;background:${o.bg};border:1px solid ${o.color}44;border-radius:4px;font-size:11px;color:${o.color}">
        ${x.question.display}${!x.correct?'<span style="color:#f87171;margin-left:4px">✗</span>':''}
        ${x.correct&&x.timeMs>8000?'<span style="color:#fbbf24;margin-left:4px">⏱</span>':''}</span>`).join('')}
    </div></div>`;
}
function dtbl(r,o){
  return `<div style="max-height:320px;overflow-y:auto">
    <div class="dh"><span>SOAL</span><span style="text-align:center">JAWABAN</span>
      <span style="text-align:center">WAKTU</span><span style="text-align:center">STATUS</span></div>
    ${r.map((x,i)=>{const s=sp(x.timeMs);return`<div class="dr" style="${i%2?'background:rgba(255,255,255,.01)':''}">
      <span style="color:${o.color};font-size:12px;font-weight:500">${x.question.display}
        <span style="color:#2a2a3a;font-size:10px"> = ${x.question.answer}</span></span>
      <span style="text-align:center;font-size:12px;color:${x.correct?'#4ade80':'#f87171'}">${x.userAnswer}</span>
      <div style="text-align:center"><div style="font-size:11px;color:${s.c}">${(x.timeMs/1000).toFixed(1)}s</div>
        <div style="font-size:8px;color:${s.c};opacity:.7">${s.i} ${s.l}</div></div>
      <div style="text-align:center;font-size:13px">${x.correct?'✅':'❌'}</div></div>`;
    }).join('')}</div>`;
}

// ══════════════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════════════
function goHome(){
  const hb=document.getElementById('histBtn');
  if(hb)hb.style.display=Object.keys(history).length>0?'block':'none';
  showSc('scHome');
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
(function(){
  const hb=document.getElementById('histBtn');
  if(hb&&Object.keys(history).length>0)hb.style.display='block';
})();

// ══════════════════════════════════════════════════
//  PWA
// ══════════════════════════════════════════════════
if('serviceWorker' in navigator){
  const sw=`const C='mv1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('/'))));
  self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/')))))`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
let dp=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();dp=e;
  const b=document.createElement('div');
  b.id='ib';b.className='';
  b.style.cssText='position:fixed;bottom:16px;left:16px;right:16px;background:#1a1a28;border:1px solid #4ade8044;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:999';
  b.innerHTML=`<div style="flex:1"><div style="font-size:12px;color:#4ade80;font-weight:700">📲 Install Aplikasi</div>
    <div style="font-size:10px;color:#555;margin-top:2px">Simpan ke homescreen untuk akses offline</div></div>
    <button onclick="iApp()" style="padding:8px 14px;background:rgba(74,222,128,.1);border:1px solid #4ade80;border-radius:8px;color:#4ade80;font-size:11px">Install</button>
    <button onclick="document.getElementById('ib').remove()" style="padding:8px 10px;background:transparent;border:1px solid #1e1e2e;border-radius:8px;color:#444;font-size:11px">✕</button>`;
  document.body.appendChild(b);
});
function iApp(){if(dp){dp.prompt();dp.userChoice.then(()=>{dp=null});const b=document.getElementById('ib');if(b)b.remove();}}
</script>
